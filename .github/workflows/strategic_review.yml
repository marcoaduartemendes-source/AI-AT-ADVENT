name: Strategic Review (weekly)

# Calls Claude Opus 4.7 once per week with the book's full data and
# persists structured recommendations. Recommendations are NEVER applied
# automatically — the user reviews them on the dashboard.

on:
  schedule:
    - cron: "0 13 * * 1"      # Mondays at 13:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: strategic-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Three separate restores because each cache was saved by a different
      # workflow with a different path list — actions/cache requires the
      # path list to match between save and restore for the lookup to hit.

      - name: Restore orchestrator state (risk + allocator + perf)
        uses: actions/cache/restore@v5
        with:
          path: |
            data/risk_state.db
            data/allocator.db
            data/trading_performance.db
          key: orchestrator-state-readonly-placeholder
          restore-keys: orchestrator-state-

      - name: Restore signal bus (from scouts workflow)
        uses: actions/cache/restore@v5
        with:
          path: |
            data/signal_bus.db
            data/risk_state.db
            data/allocator.db
            data/trading_performance.db
          key: orchestrator-state-readonly-placeholder-scouts
          restore-keys: orchestrator-state-

      - name: Restore review database
        uses: actions/cache/restore@v5
        with:
          path: data/strategic_review.db
          key: strategic-review-readonly-placeholder
          restore-keys: strategic-review-

      - run: mkdir -p data

      - name: Run strategic review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/run_strategic_review.py

      - name: Save review database
        uses: actions/cache/save@v5
        with:
          path: data/strategic_review.db
          key: strategic-review-${{ github.run_number }}

      - name: Notify on workflow failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${ALERT_WEBHOOK_URL}" ]; then exit 0; fi
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload=$(printf '{"text":"\\u274c strategic_review failed: %s"}' "$run_url")
          curl -sS -X POST -H 'Content-Type: application/json' \
               -d "$payload" "$ALERT_WEBHOOK_URL" || true

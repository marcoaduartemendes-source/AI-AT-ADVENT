name: Broker Health Check

on:
  workflow_dispatch:
  push:
    branches: [claude/daily-ai-news-digest-vcaC1]
    paths:
      - "src/brokers/**"
      - "src/brokers_check.py"
      - ".github/workflows/brokers_check.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run multi-broker health check
        env:
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          ALPACA_API_KEY_ID:   ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_ENDPOINT:     ${{ secrets.ALPACA_ENDPOINT }}
          KALSHI_KEY_ID:       ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY:  ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_ENDPOINT:     ${{ secrets.KALSHI_ENDPOINT }}
        run: python src/brokers_check.py

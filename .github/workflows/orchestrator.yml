name: Multi-Asset Orchestrator (DRY)

# This is the new orchestrator-driven trading system. Runs alongside the
# legacy "Crypto Trading Bot" workflow during validation. Once we're
# confident the new system is healthy (W2-W3), the legacy workflow will
# be retired and this one promoted.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # allowed to save risk/allocator DBs to cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Restore state databases
        uses: actions/cache@v4
        with:
          path: |
            data/risk_state.db
            data/allocator.db
            data/trading_performance.db
            data/alert_dedup.db
            data/strategy_alert_state.db
            data/signal_bus.db
          key: orchestrator-state-${{ github.run_number }}
          restore-keys: orchestrator-state-

      - name: Create data directory
        run: mkdir -p data

      - name: Run orchestrator cycle
        env:
          # Brokers
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          ALPACA_API_KEY_ID:   ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_ENDPOINT:     ${{ secrets.ALPACA_ENDPOINT }}
          KALSHI_KEY_ID:       ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY:  ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_ENDPOINT:     ${{ secrets.KALSHI_ENDPOINT }}
          # Orchestrator config
          DRY_RUN:                 ${{ vars.ORCHESTRATOR_DRY_RUN || 'true' }}
          DRY_RUN_COINBASE:        ${{ vars.DRY_RUN_COINBASE }}
          DRY_RUN_ALPACA:          ${{ vars.DRY_RUN_ALPACA }}
          DRY_RUN_KALSHI:          ${{ vars.DRY_RUN_KALSHI }}
          LIVE_STRATEGIES:         ${{ vars.LIVE_STRATEGIES }}
          MAX_TRADE_USD_GLOBAL:    ${{ vars.MAX_TRADE_USD_GLOBAL || '5000' }}
          MAX_TRADE_USD_COINBASE:  ${{ vars.MAX_TRADE_USD_COINBASE }}
          MAX_TRADE_USD_ALPACA:    ${{ vars.MAX_TRADE_USD_ALPACA }}
          MAX_TRADE_USD_KALSHI:    ${{ vars.MAX_TRADE_USD_KALSHI }}
          RISK_MULTIPLIER:         ${{ vars.RISK_MULTIPLIER || '1.0' }}
          TARGET_PORTFOLIO_VOL:    ${{ vars.TARGET_PORTFOLIO_VOL || '0.12' }}
          KILL_DD_PCT:             ${{ vars.KILL_DD_PCT || '0.15' }}
          CRITICAL_DD_PCT:         ${{ vars.CRITICAL_DD_PCT || '0.10' }}
          WARNING_DD_PCT:          ${{ vars.WARNING_DD_PCT || '0.05' }}
          # Out-of-band alerts on KILL switch + PnL drift. Optional —
          # silently logs to stdout if NONE of these are set. Multiple
          # sinks can be enabled simultaneously; whichever delivers
          # first wins.
          #   Webhook (Slack/Discord/etc.):
          ALERT_WEBHOOK_URL:       ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_TYPE:      ${{ vars.ALERT_WEBHOOK_TYPE }}
          #   Email or carrier-SMS-gateway via Gmail (reuses the daily
          #   digest's SMTP_PASSWORD):
          ALERT_EMAIL_TO:          ${{ vars.ALERT_EMAIL_TO }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:               ${{ vars.SMTP_FROM }}
          #   Pushover (phone push, $5 one-time):
          PUSHOVER_USER_KEY:       ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN:      ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_DEVICE:         ${{ vars.PUSHOVER_DEVICE }}
          # Supabase Postgres for state persistence. Optional —
          # falls back to SQLite when unset. When set, every trade /
          # equity snapshot / kill-switch event dual-writes to
          # Postgres so we have point-in-time recovery + a real DB
          # for the dashboard to query.
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Tag rows with which deployment recorded them — useful
          # during the GH→Hetzner transition window.
          DEPLOY_ENV:              github-actions
          # Alert dedup config (SQLite-backed; cached above so it
          # works across cycles).
          ALERTS_MUTE:                  ${{ vars.ALERTS_MUTE }}
          ALERT_DEDUP_COOLDOWN_SECONDS: ${{ vars.ALERT_DEDUP_COOLDOWN_SECONDS || '3600' }}
        run: python src/run_orchestrator.py --once

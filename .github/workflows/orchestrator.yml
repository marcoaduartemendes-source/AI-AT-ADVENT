name: Multi-Asset Orchestrator (DRY)

# This is the new orchestrator-driven trading system. Runs alongside the
# legacy "Crypto Trading Bot" workflow during validation. Once we're
# confident the new system is healthy (W2-W3), the legacy workflow will
# be retired and this one promoted.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    # Hard-cap so a stuck cycle (broker timeout, retry loop) gets
    # killed before the next 5-min cron tick — without this, runs
    # queue up under cancel-in-progress: false and can race the
    # actions/cache save under the same run_number.
    # Bumped 4 → 8 min 2026-05-08: 26 strategies × per-strategy
    # broker calls + per-cycle compute_state was running right at
    # the 4-min boundary, often timing out BEFORE the cache-save
    # step ran. That meant new trades.db rows never persisted and
    # the dashboard kept showing "0 trades" — the user's complaint.
    timeout-minutes: 8
    permissions:
      contents: write       # allowed to save risk/allocator DBs to cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Restore state databases
        uses: actions/cache@v4
        with:
          path: |
            data/risk_state.db
            data/allocator.db
            data/trading_performance.db
            data/alert_dedup.db
            data/strategy_alert_state.db
            data/signal_bus.db
          key: orchestrator-state-${{ github.run_number }}
          restore-keys: orchestrator-state-

      - name: Create data directory
        run: mkdir -p data

      - name: Run orchestrator cycle
        env:
          # Brokers
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          ALPACA_API_KEY_ID:   ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_ENDPOINT:     ${{ secrets.ALPACA_ENDPOINT }}
          KALSHI_KEY_ID:       ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY:  ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_ENDPOINT:     ${{ secrets.KALSHI_ENDPOINT }}
          # Orchestrator config
          # Global DRY default stays true — protects real-money venues
          # (Coinbase). Per-venue overrides below enable paper trading
          # on the simulated venues (Alpaca paper, Kalshi demo) so
          # strategies actually deploy capital and produce fill data.
          DRY_RUN:                 ${{ vars.ORCHESTRATOR_DRY_RUN || 'true' }}
          # Two-key live-trading guard: even with DRY_RUN=false the
          # orchestrator refuses to place real orders unless this is
          # also '1'. Forces an explicit, recent decision rather than
          # one stale "DRY_RUN=false" toggle accidentally going live.
          ALLOW_LIVE_TRADING:      ${{ vars.ALLOW_LIVE_TRADING }}
          # Coinbase = REAL money. Default DRY unless the user has
          # explicitly set DRY_RUN_COINBASE=false in repo Variables
          # AND set ALLOW_LIVE_TRADING=1.
          DRY_RUN_COINBASE:        ${{ vars.DRY_RUN_COINBASE || 'true' }}
          # Alpaca + Kalshi default to PAPER (orders fire against the
          # paper / sandbox endpoint, no real money at risk). Override
          # via repo Variables if you want them DRY for some reason.
          DRY_RUN_ALPACA:          ${{ vars.DRY_RUN_ALPACA || 'false' }}
          DRY_RUN_KALSHI:          ${{ vars.DRY_RUN_KALSHI || 'false' }}
          LIVE_STRATEGIES:         ${{ vars.LIVE_STRATEGIES }}
          # Safe default ($50, not $5k) for forks / first-time setups.
          # Override via repository var MAX_TRADE_USD_GLOBAL when ready.
          MAX_TRADE_USD_GLOBAL:    ${{ vars.MAX_TRADE_USD_GLOBAL || '50' }}
          # Coinbase: real money — kept tight at $100 unless the
          # user raises the cap explicitly.
          MAX_TRADE_USD_COINBASE:  ${{ vars.MAX_TRADE_USD_COINBASE || '100' }}
          # Alpaca: paper money — generous $10k cap so strategies can
          # actually deploy meaningful sizes during paper-trading
          # experimentation. Override down via repo var if needed.
          MAX_TRADE_USD_ALPACA:    ${{ vars.MAX_TRADE_USD_ALPACA || '10000' }}
          MAX_TRADE_USD_KALSHI:    ${{ vars.MAX_TRADE_USD_KALSHI }}
          RISK_MULTIPLIER:         ${{ vars.RISK_MULTIPLIER || '1.0' }}
          TARGET_PORTFOLIO_VOL:    ${{ vars.TARGET_PORTFOLIO_VOL || '0.12' }}
          KILL_DD_PCT:             ${{ vars.KILL_DD_PCT || '0.15' }}
          CRITICAL_DD_PCT:         ${{ vars.CRITICAL_DD_PCT || '0.10' }}
          WARNING_DD_PCT:          ${{ vars.WARNING_DD_PCT || '0.05' }}
          # Out-of-band alerts on KILL switch + PnL drift. Optional —
          # silently logs to stdout if NONE of these are set. Multiple
          # sinks can be enabled simultaneously; whichever delivers
          # first wins.
          #   Webhook (Slack/Discord/etc.):
          ALERT_WEBHOOK_URL:       ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_TYPE:      ${{ vars.ALERT_WEBHOOK_TYPE }}
          #   Email or carrier-SMS-gateway via Gmail (reuses the daily
          #   digest's SMTP_PASSWORD):
          ALERT_EMAIL_TO:          ${{ vars.ALERT_EMAIL_TO }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:               ${{ vars.SMTP_FROM }}
          #   Pushover (phone push, $5 one-time):
          PUSHOVER_USER_KEY:       ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN:      ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_DEVICE:         ${{ vars.PUSHOVER_DEVICE }}
          # Supabase Postgres for state persistence. Optional —
          # falls back to SQLite when unset. When set, every trade /
          # equity snapshot / kill-switch event dual-writes to
          # Postgres so we have point-in-time recovery + a real DB
          # for the dashboard to query.
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Tag rows with which deployment recorded them — useful
          # during the GH→Hetzner transition window.
          DEPLOY_ENV:              github-actions
          # Alert dedup + mute config (SQLite-backed; cached above
          # so dedup state survives across cycles).
          # Default: mute info/warning, only critical kill-switch
          # alerts fire. Two strategies of unstable code generated a
          # Pushover spam storm before the user could react. Set
          # repo Variable ALERTS_MUTE=0 to opt into the verbose
          # firehose. 2026-05-08 user request: "im getting bombarded
          # with pushover alerts fix it".
          ALERTS_MUTE:                  ${{ vars.ALERTS_MUTE || '1' }}
          # Cooldown bumped from 1h → 6h so the same recurring drift
          # message doesn't ping every hour. Critical alerts always
          # bypass dedup so safety signals are not delayed.
          ALERT_DEDUP_COOLDOWN_SECONDS: ${{ vars.ALERT_DEDUP_COOLDOWN_SECONDS || '21600' }}
          # Healthchecks.io dead-man's-switch URLs. When set, the
          # orchestrator pings start/success/fail at each cycle so a
          # crashed runner / silent failure surfaces via Healthchecks
          # alerting (out-of-band from the in-process alert sinks
          # that wouldn't fire if the process itself died).
          HEALTHCHECKS_PING_URL_ORCHESTRATOR: ${{ secrets.HEALTHCHECKS_PING_URL_ORCHESTRATOR }}
        # Tee stdout+stderr so the failure-notify step can attach the
        # tail to the webhook (otherwise log access requires a logged-in
        # GitHub session). `set -o pipefail` keeps the original exit code.
        run: |
          set -o pipefail
          # Cold-start auto-detection happens inside run_orchestrator.py
          # via the GITHUB_ACTIONS env var — no flag needed. See the
          # auto-bootstrap branch in main() for the rationale.
          python -u src/run_orchestrator.py --once 2>&1 | tee /tmp/orchestrator.log

      - name: Upload orchestrator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-log
          path: /tmp/orchestrator.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Rebuild dashboard from same cache
        # Rebuild docs/index.html in the same job that just wrote
        # trading_performance.db, so the dashboard is ALWAYS in sync
        # with the latest cycle's data — no separate dashboard cron
        # racing on cache restore. Failure here is non-fatal: the
        # orchestrator's work is already done; only the rendered HTML
        # is stale until the next cycle.
        if: always()
        env:
          # Mirror the dashboard.yml env so mode classification matches
          DRY_RUN:                 ${{ vars.ORCHESTRATOR_DRY_RUN || 'true' }}
          DRY_RUN_COINBASE:        ${{ vars.DRY_RUN_COINBASE || 'true' }}
          DRY_RUN_ALPACA:          ${{ vars.DRY_RUN_ALPACA || 'false' }}
          DRY_RUN_KALSHI:          ${{ vars.DRY_RUN_KALSHI || 'false' }}
          LIVE_STRATEGIES:         ${{ vars.LIVE_STRATEGIES }}
          ALLOW_LIVE_TRADING:      ${{ vars.ALLOW_LIVE_TRADING }}
        continue-on-error: true
        run: |
          python src/build_dashboard.py || echo "(dashboard build failed; continuing)"

      - name: Commit dashboard if content changed
        if: always()
        continue-on-error: true
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p docs
          # Hash the rendered HTML with dynamic timestamps stripped, so
          # we only commit when the underlying numbers change — same
          # logic as dashboard.yml.
          python - <<'PY'
          import hashlib, pathlib, re
          path = pathlib.Path("docs/index.html")
          if not path.exists():
              print("no dashboard file"); raise SystemExit
          html = path.read_text(encoding="utf-8")
          patterns = [
            r'<time data-ts="[^"]+">[^<]*</time>',
            r'"generated_at":\s*"[^"]+"',
            r'"last_ok_at":\s*"[^"]+"',
            r'"as_of":\s*"[^"]+"',
            r'data-generated="[^"]*"',
            r'fresh.{0,4}seconds.{0,4}\d+',
          ]
          stripped = html
          for p in patterns:
              stripped = re.sub(p, "", stripped)
          h = hashlib.sha256(stripped.encode("utf-8")).hexdigest()
          pathlib.Path("docs/.dashboard-content-hash").write_text(h)
          PY
          # Also stage docs/cycle_status.json + docs/trades_recent.json
          # — written by the orchestrator's _dump_*_json() helpers in
          # the same cycle. These are the belt-and-suspenders path
          # that bypasses actions/cache entirely. cycle_status holds
          # diagnostics; trades_recent holds the raw trade ledger.
          git add docs/index.html docs/.dashboard-content-hash docs/cycle_status.json docs/trades_recent.json docs/benchmark.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No dashboard changes."
            exit 0
          fi
          # Skip when only the hash file moved (timestamp-only change)
          if ! git diff --cached --name-only | grep -qx docs/.dashboard-content-hash; then
            echo "Only timestamp moved; skip."
            git restore --staged docs/index.html
            exit 0
          fi
          git commit -m "chore: refresh trading dashboard (orchestrator)"
          # Pull-rebase + push retry to handle the race against
          # concurrent commits. Best-effort; failure here means the
          # rendered HTML is one cycle stale, which is acceptable.
          for i in 1 2 3; do
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" 2>/dev/null || true
            if git push; then echo "pushed"; exit 0; fi
            sleep $((i * 2))
          done
          echo "push failed after retries; dashboard will be stale until next cycle"
          exit 0

      - name: Notify on workflow failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL:  ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_TYPE: ${{ vars.ALERT_WEBHOOK_TYPE }}
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          # Also dump the tail of the orchestrator log into THIS step's
          # stdout — annotation summaries don't show step content, but
          # this step's content is always visible without expanding.
          echo "════════ orchestrator.log tail (last 80 lines) ════════"
          tail -n 80 /tmp/orchestrator.log 2>/dev/null || echo "(no log file)"
          echo "═══════════════════════════════════════════════════════"

          if [ -z "${ALERT_WEBHOOK_URL}" ]; then
            echo "ALERT_WEBHOOK_URL not set; skipping webhook notification"
            exit 0
          fi
          # Send the tail of the log to the webhook so the user sees
          # WHY it failed without digging through GH Actions UI.
          tail_log=$(tail -n 30 /tmp/orchestrator.log 2>/dev/null | \
                     python3 -c 'import sys,json; print(json.dumps(sys.stdin.read())[1:-1])' || echo "(log unavailable)")
          payload=$(printf '{"text":"\\u274c orchestrator failed: %s\\n```%s```"}' "$run_url" "$tail_log")
          curl -sS -X POST -H 'Content-Type: application/json' \
               -d "$payload" "$ALERT_WEBHOOK_URL" || true

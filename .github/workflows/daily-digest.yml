name: Daily AI News Digest

on:
  # 10:00 UTC = 5:00 AM EST (UTC-5, Nov–Mar)
  # During EDT (UTC-4, Mar–Nov) this fires at 6:00 AM ET — adjust to 09:00 if preferred
  schedule:
    - cron: "0 10 * * *"

  # Manual trigger for testing — runs immediately with a button click in GitHub UI
  workflow_dispatch:
    inputs:
      hours_back:
        description: "How many hours of news to fetch (default: 24)"
        required: false
        default: "24"

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify secrets are populated
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:     ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
        run: |
          python - <<'PY'
          import os, sys
          names = ["ANTHROPIC_API_KEY","EMAIL_FROM","EMAIL_TO","SMTP_HOST",
                   "SMTP_PORT","SMTP_USERNAME","SMTP_PASSWORD"]
          missing = []
          for k in names:
              v = os.environ.get(k, "").strip()
              if v:
                  print(f"  {k}: SET ({len(v)} chars)")
              else:
                  missing.append(k)
                  print(f"  {k}: MISSING")
          if missing:
              print("ERROR: Missing secrets:", ", ".join(missing), file=sys.stderr)
              sys.exit(1)
          PY

      - name: Test SMTP connection
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: |
          python - <<'PY'
          import smtplib, os, sys, ssl

          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT", "587"))
          user = os.environ["SMTP_USERNAME"]
          pwd  = os.environ["SMTP_PASSWORD"]

          print(f"Testing SMTP {host}:{port} as {user} ...")
          errors = []

          # Try STARTTLS port 587
          try:
              with smtplib.SMTP(host, port, timeout=15) as s:
                  s.starttls()
                  s.login(user, pwd)
              print("STARTTLS login: OK")
              sys.exit(0)
          except smtplib.SMTPAuthenticationError as e:
              errors.append(f"STARTTLS auth FAILED: {e}")
          except Exception as e:
              errors.append(f"STARTTLS connect FAILED: {e}")

          # Try SSL port 465
          try:
              ctx = ssl.create_default_context()
              with smtplib.SMTP_SSL(host, 465, context=ctx, timeout=15) as s:
                  s.login(user, pwd)
              print("SSL-465 login: OK")
              sys.exit(0)
          except smtplib.SMTPAuthenticationError as e:
              errors.append(f"SSL-465 auth FAILED: {e}")
          except Exception as e:
              errors.append(f"SSL-465 connect FAILED: {e}")

          for err in errors:
              print(err, file=sys.stderr)
          sys.exit(1)
          PY


        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:     ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          HOURS_BACK:        ${{ github.event.inputs.hours_back || '24' }}
        run: python -m src.main

name: Daily AI News Digest

on:
  schedule:
    - cron: "0 9 * * *"   # 9:00 UTC = 5 AM EDT (Mar–Nov) / change to 0 10 for EST (Nov–Mar)

  workflow_dispatch:
    inputs:
      smtp_password:
        description: "Gmail App Password (leave blank — uses saved secret)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # match the rest of the project
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send digest
        env:
          SMTP_PASSWORD: ${{ github.event.inputs.smtp_password || secrets.SMTP_PASSWORD }}
          SMTP_FROM:     ${{ vars.SMTP_FROM }}
        run: python send_digest.py

      - name: Notify on workflow failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${ALERT_WEBHOOK_URL}" ]; then exit 0; fi
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload=$(printf '{"text":"\\u274c daily-digest failed: %s"}' "$run_url")
          curl -sS -X POST -H 'Content-Type: application/json' \
               -d "$payload" "$ALERT_WEBHOOK_URL" || true

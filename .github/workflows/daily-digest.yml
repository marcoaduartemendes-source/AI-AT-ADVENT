name: Daily AI News Digest

on:
  schedule:
    - cron: "0 10 * * *"   # Every day 5 AM EST

  workflow_dispatch:
    inputs:
      smtp_password:
        description: "Gmail App Password (leave blank — uses saved secret)"
        required: false
        default: ""

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Send digest
        env:
          SMTP_PASSWORD: ${{ github.event.inputs.smtp_password || secrets.SMTP_PASSWORD }}
        run: python send_digest.py

name: Build Dashboard

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes — dashboard must reflect live state
  workflow_dispatch:

concurrency:
  group: dashboard-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/daily-ai-news-digest-vcaC1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore legacy trading database (read-only) — fallback only
        # We restore the *legacy* bot's trading DB FIRST, then let the
        # orchestrator-state restore (next step) overwrite it. The
        # orchestrator now writes every multi-strategy trade to
        # data/trading_performance.db via PerformanceTracker.record_trade,
        # so its copy is the authoritative source for the dashboard.
        # The legacy DB only matters if the orchestrator hasn't run yet.
        uses: actions/cache/restore@v4
        with:
          path: data/trading_performance.db
          key: trading-db-readonly-placeholder
          restore-keys: trading-db-

      - name: Restore orchestrator state databases (authoritative)
        # This MUST run AFTER the legacy restore so its
        # data/trading_performance.db wins. The orchestrator's
        # trading_performance.db contains all trades across all
        # strategies / brokers (Coinbase, Alpaca, Kalshi).
        # Path list MUST match the orchestrator workflow's save list
        # exactly or actions/cache will skip the restore.
        uses: actions/cache/restore@v4
        with:
          path: |
            data/risk_state.db
            data/allocator.db
            data/trading_performance.db
          key: orchestrator-state-readonly-placeholder
          restore-keys: orchestrator-state-

      - name: Restore signal bus (from scouts workflow)
        # The scouts workflow saves under key
        # orchestrator-state-<n>-scouts with this 4-path signature.
        # Path list MUST match exactly for the lookup to hit.
        uses: actions/cache/restore@v4
        with:
          path: |
            data/signal_bus.db
            data/risk_state.db
            data/allocator.db
            data/trading_performance.db
          key: orchestrator-state-readonly-placeholder-scouts
          restore-keys: orchestrator-state-

      - name: List restored DBs
        run: ls -la data/ 2>/dev/null || echo "(data dir empty)"

      - name: Build dashboard
        env:
          TRADING_PRODUCTS:    ${{ vars.TRADING_PRODUCTS || 'BTC-USD,ETH-USD,SOL-USD' }}
          GRANULARITY:         ${{ vars.GRANULARITY || 'FIVE_MINUTE' }}
          MAX_TRADE_USD:       ${{ vars.MAX_TRADE_USD || '20' }}
          MIN_CONFIDENCE:      ${{ vars.MIN_CONFIDENCE || '0.6' }}
          STOP_LOSS_PCT:       ${{ vars.STOP_LOSS_PCT || '0.02' }}
          TAKE_PROFIT_PCT:     ${{ vars.TAKE_PROFIT_PCT || '0.04' }}
          COOLDOWN_SECONDS:    ${{ vars.COOLDOWN_SECONDS || '900' }}
          # Broker credentials so the dashboard can pull LIVE positions
          # alongside the historical trade DB.
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          ALPACA_API_KEY_ID:   ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_ENDPOINT:     ${{ secrets.ALPACA_ENDPOINT }}
          KALSHI_KEY_ID:       ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY:  ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_ENDPOINT:     ${{ secrets.KALSHI_ENDPOINT }}
          # Polygon.io for PEAD + commodity backtests. Optional —
          # backtests gracefully skip with note="POLYGON_API_KEY not
          # set" if the secret isn't configured.
          POLYGON_API_KEY:     ${{ secrets.POLYGON_API_KEY }}
        run: python src/build_dashboard.py

      - name: Commit dashboard if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No dashboard changes."
            exit 0
          fi
          git commit -m "chore: refresh trading dashboard"
          # Push with rebase + retry to handle the race against
          # concurrent commits (orchestrator state cache, strategy edits).
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin claude/daily-ai-news-digest-vcaC1 || true
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying…"
            sleep $((attempt * 3))
          done
          echo "All push attempts failed"; exit 1

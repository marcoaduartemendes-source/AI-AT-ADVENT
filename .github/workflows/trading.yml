name: Crypto Trading Bot

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour (UTC)
  workflow_dispatch:        # manual trigger from GitHub website / iPhone

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  trade-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      # ── 1. Code ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Restore DB from previous run (keeps trade history + positions) ────
      - name: Restore trading database
        uses: actions/cache@v4
        with:
          path: data/trading_performance.db
          key: trading-db-${{ github.run_number }}
          restore-keys: trading-db-

      - run: mkdir -p data dashboard

      # ── 4. Run one trading cycle ─────────────────────────────────────────────
      - name: Run trading cycle
        env:
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          DRY_RUN:             ${{ vars.DRY_RUN || 'true' }}
          MAX_TRADE_USD:       ${{ vars.MAX_TRADE_USD || '20' }}
          MIN_CONFIDENCE:      ${{ vars.MIN_CONFIDENCE || '0.6' }}
          TRADING_PRODUCTS:    ${{ vars.TRADING_PRODUCTS || 'BTC-USD,ETH-USD,SOL-USD' }}
        run: python src/main_trading.py --once

      # ── 5. Upload dashboard to GitHub Pages ──────────────────────────────────
      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4

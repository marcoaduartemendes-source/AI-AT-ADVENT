name: Crypto Trading Bot (RETIRED — basic strategies only)

# Retired in W2: this workflow ran the original EMA/MACD/Bollinger
# strategies that lost 1.27%/round-trip to fees in backtest. Replaced by
# the new "Multi-Asset Orchestrator" workflow which runs the 10 advanced
# strategies through the layered architecture (broker → strategy → risk →
# allocator → execution).
#
# Schedule disabled. Available on manual dispatch only for historical
# verification — DO NOT re-enable without removing this comment.

on:
  workflow_dispatch:

# Allow only one run at a time; cancel scheduled runs that pile up if a previous one is still going
concurrency:
  group: crypto-trading-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to save the database back to the repo

    steps:
      # ── 1. Get the code ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Restore database from previous run ────────────────────────────────
      - name: Restore trading database
        uses: actions/cache@v4
        with:
          path: data/trading_performance.db
          key: trading-db-${{ github.run_number }}
          restore-keys: trading-db-

      - name: Create data directory
        run: mkdir -p data

      # ── 4. Run one trading cycle ─────────────────────────────────────────────
      - name: Run trading cycle
        env:
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          DRY_RUN:             ${{ vars.DRY_RUN || 'true' }}
          MAX_TRADE_USD:       ${{ vars.MAX_TRADE_USD || '20' }}
          MIN_CONFIDENCE:      ${{ vars.MIN_CONFIDENCE || '0.6' }}
          TRADING_PRODUCTS:    ${{ vars.TRADING_PRODUCTS || 'BTC-USD,ETH-USD,SOL-USD' }}
          GRANULARITY:         ${{ vars.GRANULARITY || 'FIVE_MINUTE' }}
          STOP_LOSS_PCT:       ${{ vars.STOP_LOSS_PCT || '0.02' }}
          TAKE_PROFIT_PCT:     ${{ vars.TAKE_PROFIT_PCT || '0.04' }}
          MAX_OPEN_POSITIONS:  ${{ vars.MAX_OPEN_POSITIONS || '5' }}
          COOLDOWN_SECONDS:    ${{ vars.COOLDOWN_SECONDS || '900' }}
        run: python src/main_trading.py --once

      # ── 5. Save database so next run remembers positions ─────────────────────
      # (cache is already saved automatically by actions/cache above)

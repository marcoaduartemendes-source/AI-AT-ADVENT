name: Deploy to VPS

# Pushes the latest code + secrets to the DigitalOcean droplet over
# SSH. Triggered manually or on push to the active branch.
#
# Runs as a GitHub Actions job (with read access to all repo secrets)
# and writes them to /etc/aaa.env on the VPS, then restarts systemd.
# This is the "Option A" deploy pattern — secrets stay in GitHub
# (never pasted into chat, never in repo, never on disk on dev
# machines), VPS just receives the rendered env file at deploy time.
#
# What it does NOT do:
#   - Install Python / clone repo / set up systemd. That's a
#     one-shot bootstrap via deploy/install.sh, run once on a fresh
#     box. After bootstrap, this workflow handles everything.
#
# Required secrets (you set these once):
#   SSH_DEPLOY_KEY       Private SSH key with access to root@<droplet>
#   DROPLET_IP           Public IPv4 of the droplet (also a vars option)
#   ...all the existing secrets the orchestrator already uses (COINBASE
#      / ALPACA / KALSHI / FMP / PUSHOVER / SUPABASE / ANTHROPIC)
#
# Optional repo variables (settings/variables/actions):
#   DROPLET_IP           Same value, exposed as a variable for visibility
#                          (it's not really a secret; can be either)
#   ALERT_EMAIL_TO, MAX_TRADE_USD_GLOBAL, etc — already used by the
#   GH Actions workflows; same values flow to the VPS

on:
  push:
    branches:
      - claude/daily-ai-news-digest-vcaC1
      - main
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'deploy/**'
      - '.github/workflows/deploy_vps.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false   # Don't cancel a running deploy mid-flight

jobs:
  # CI quality gate — block deploys on red tests / red lint. Without
  # this gate a broken commit pushed to the branch goes straight to
  # the VPS within ~30s, before any contributor (or hook) catches
  # it. We re-run the same suite the Tests workflow runs so this
  # gate is self-contained: it cannot pass without the test suite
  # being green, regardless of whether the Tests workflow itself
  # has finished yet on the same SHA.
  test_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: pytest tests/ -q --tb=short
      # The orchestrator imports + runs --status without trading,
      # which hits the same code paths as a real cycle (broker
      # registry build, risk compute_state, allocator rebalance)
      # without any side effects. Catches import errors / missing
      # env / startup crashes BEFORE we ship to the VPS.
      - name: Smoke test orchestrator boot
        env:
          PYTHONIOENCODING: utf-8
          # Minimal env so build_brokers + risk init don't crash
          DRY_RUN: "true"
          # Fake creds — adapters log "not configured" but don't crash
          ALPACA_API_KEY_ID: ""
          COINBASE_API_KEY: ""
          KALSHI_KEY_ID: ""
        run: |
          PYTHONPATH=src python -c "
          # Just import the orchestrator entrypoint module to verify
          # all imports + class definitions are wired correctly.
          # A real --status call would need broker creds we don't
          # have in CI; the import alone catches 90% of pre-deploy
          # breakage (missing imports, syntax errors in any
          # transitively-imported strategy or scout).
          import run_orchestrator
          import run_daily_digest
          # Touch every strategy class so registration code paths run
          from strategies import (
              BollingerBreakout, CommodityCarry, CrossVenueArb,
              CryptoBasisTrade, CryptoFundingCarry, CryptoFundingCarryV2,
              CryptoXSMom, DividendGrowth, EarningsMomentum,
              EarningsNewsPEAD, GapTrading, InternationalsRotation,
              KalshiCalibrationArb, LowVolAnomaly, MacroKalshi,
              MacroKalshiV2, PEAD, PairsTrading, RSIMeanReversion,
              RiskParityETF, SectorRotation, TSMomETF, TurnOfMonth,
              VolManagedOverlay,
          )
          print('Orchestrator + 24 strategies import cleanly')
          "

  deploy:
    needs: test_gate    # Block deploy on the gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pre-accept the host key so the SSH commands below don't prompt.
          # Falls back to skipping host check if the keyscan fails (e.g.
          # firewall blocks the runner — rare but possible).
          ssh-keyscan -H -t ed25519 "${{ vars.DROPLET_IP || secrets.DROPLET_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Render /etc/aaa.env from secrets
        env:
          # Pull every secret the orchestrator needs. Note that we use
          # repo VARIABLES for non-sensitive things (DRY_RUN, caps,
          # strategy lists) and secrets for credentials.
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          ALPACA_API_KEY_ID:   ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_ENDPOINT:     ${{ secrets.ALPACA_ENDPOINT }}
          KALSHI_KEY_ID:       ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY:  ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_ENDPOINT:     ${{ secrets.KALSHI_ENDPOINT }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FMP_API_KEY:         ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          PUSHOVER_USER_KEY:   ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN:  ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_DEVICE:     ${{ vars.PUSHOVER_DEVICE }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALERT_WEBHOOK_URL:   ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_TYPE:  ${{ vars.ALERT_WEBHOOK_TYPE }}
          ALERT_EMAIL_TO:      ${{ vars.ALERT_EMAIL_TO }}
          SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
          # Trading config (variables, not secrets)
          DRY_RUN:             ${{ vars.ORCHESTRATOR_DRY_RUN || 'true' }}
          DRY_RUN_ALPACA:      ${{ vars.DRY_RUN_ALPACA || 'false' }}
          DRY_RUN_KALSHI:      ${{ vars.DRY_RUN_KALSHI || 'false' }}
          DRY_RUN_COINBASE:    ${{ vars.DRY_RUN_COINBASE }}
          LIVE_STRATEGIES:     ${{ vars.LIVE_STRATEGIES }}
          # Alert spam control — set ALERTS_MUTE=1 in repo Variables
          # to silence non-critical Pushover/email alerts. Critical
          # alerts still fire regardless. Use when debugging.
          ALERTS_MUTE:         ${{ vars.ALERTS_MUTE }}
          ALERT_DEDUP_COOLDOWN_SECONDS: ${{ vars.ALERT_DEDUP_COOLDOWN_SECONDS || '3600' }}
          MAX_TRADE_USD_GLOBAL:    ${{ vars.MAX_TRADE_USD_GLOBAL || '5000' }}
          MAX_TRADE_USD_COINBASE:  ${{ vars.MAX_TRADE_USD_COINBASE }}
          MAX_TRADE_USD_ALPACA:    ${{ vars.MAX_TRADE_USD_ALPACA }}
          TARGET_PORTFOLIO_VOL:    ${{ vars.TARGET_PORTFOLIO_VOL || '0.12' }}
          KILL_DD_PCT:             ${{ vars.KILL_DD_PCT || '0.15' }}
          CRITICAL_DD_PCT:         ${{ vars.CRITICAL_DD_PCT || '0.10' }}
          WARNING_DD_PCT:          ${{ vars.WARNING_DD_PCT || '0.05' }}
        run: |
          # Use python to write the env file so we can quote multi-line
          # values (KALSHI_PRIVATE_KEY is a PEM blob with literal \n
          # in it). The file is consumed via `bash -c 'set -a; . /etc/aaa.env'`
          # in the systemd unit, so bash-style double-quoted strings
          # with embedded newlines are valid.
          python3 - <<'PYEOF'
          import os, shlex, datetime

          fields = [
              # (key, default — None means required)
              "COINBASE_API_KEY", "COINBASE_API_SECRET",
              "ALPACA_API_KEY_ID", "ALPACA_SECRET_KEY", "ALPACA_ENDPOINT",
              "KALSHI_KEY_ID", "KALSHI_PRIVATE_KEY", "KALSHI_ENDPOINT",
              "ANTHROPIC_API_KEY", "FMP_API_KEY", "FRED_API_KEY",
              "DRY_RUN", "DRY_RUN_ALPACA", "DRY_RUN_KALSHI",
              "DRY_RUN_COINBASE", "LIVE_STRATEGIES",
              "MAX_TRADE_USD_GLOBAL", "MAX_TRADE_USD_COINBASE", "MAX_TRADE_USD_ALPACA",
              "TARGET_PORTFOLIO_VOL",
              "KILL_DD_PCT", "CRITICAL_DD_PCT", "WARNING_DD_PCT",
              "PUSHOVER_USER_KEY", "PUSHOVER_APP_TOKEN", "PUSHOVER_DEVICE",
              "ALERT_WEBHOOK_URL", "ALERT_WEBHOOK_TYPE",
              "ALERT_EMAIL_TO", "SMTP_PASSWORD",
              "SUPABASE_URL", "SUPABASE_SERVICE_KEY",
              "ALERTS_MUTE", "ALERT_DEDUP_COOLDOWN_SECONDS",
          ]

          lines = [
              f"# Generated by deploy_vps.yml at {datetime.datetime.utcnow().isoformat()}Z",
              "# Sourced by systemd unit via `bash -c 'set -a; . /etc/aaa.env'`",
              "# NEVER commit this file — it contains secrets.",
              "",
          ]
          for key in fields:
              val = os.environ.get(key, "")
              # Use shlex.quote so multi-line values, special chars,
              # quotes etc. all survive intact through bash sourcing.
              # shlex.quote returns single-quoted strings (no shell
              # interpolation), which is exactly what we want for
              # secrets — the value is opaque, not code.
              if val == "":
                  lines.append(f"{key}=")
              else:
                  lines.append(f"{key}={shlex.quote(val)}")
          # Tag rows from the VPS deployment for cutover dedup
          lines.append("DEPLOY_ENV=hetzner-vps")
          lines.append("")
          with open("/tmp/aaa.env", "w") as f:
              f.write("\n".join(lines))
          print(f"Wrote /tmp/aaa.env with {len(fields)} fields")
          PYEOF

      - name: Push code + env to droplet, restart timers
        env:
          DROPLET_IP: ${{ vars.DROPLET_IP || secrets.DROPLET_IP }}
        run: |
          set -euo pipefail
          # 1. Pull latest code on the VPS
          ssh -i ~/.ssh/deploy_key root@$DROPLET_IP \
            "bash /opt/ai-at-advent/deploy/update.sh"

          # 2. Push the rendered env file
          scp -i ~/.ssh/deploy_key /tmp/aaa.env root@$DROPLET_IP:/etc/aaa.env
          ssh -i ~/.ssh/deploy_key root@$DROPLET_IP \
            "chown root:aaa /etc/aaa.env && chmod 640 /etc/aaa.env"

          # 3. Reload systemd in case unit files changed, restart timers
          ssh -i ~/.ssh/deploy_key root@$DROPLET_IP "
            systemctl daemon-reload
            systemctl restart orchestrator.timer scouts.timer dashboard.timer
            echo '── Timer status ──'
            systemctl list-timers --all | grep -E 'orchestrator|scouts|dashboard'
            echo '── Last orchestrator log ──'
            journalctl -u orchestrator.service --no-pager -n 30 || true
          "

      - name: Sanity check
        env:
          DROPLET_IP: ${{ vars.DROPLET_IP || secrets.DROPLET_IP }}
        run: |
          ssh -i ~/.ssh/deploy_key root@$DROPLET_IP "
            test -f /etc/aaa.env || { echo 'env file missing'; exit 1; }
            test -d /opt/ai-at-advent/.venv || { echo 'venv missing'; exit 1; }
            systemctl is-active orchestrator.timer || { echo 'orch timer not active'; exit 1; }
            echo 'Deploy verified OK'
          "

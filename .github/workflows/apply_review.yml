name: Apply Strategic Review

# One-click application of the latest Opus 4.7 strategic review.
# Manual dispatch only — never auto-applies. Edits run_orchestrator.py
# in place and commits the change. Lifecycle (FREEZE/WATCH/etc) actions
# are NOT applied here; those happen via the StrategyRegistry table
# directly and need a separate manual step (or future enhancement).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-review
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Restore review database
        uses: actions/cache/restore@v5
        with:
          path: data/strategic_review.db
          key: strategic-review-readonly-placeholder
          restore-keys: strategic-review-

      - run: mkdir -p data

      - name: Apply review (writes run_orchestrator.py)
        run: python src/apply_review.py --commit

      - name: Commit changes to staging branch
        run: |
          # Push bot-authored review changes to a separate staging
          # branch (claude/strategic-review-pending) rather than the
          # deploy branch directly. This keeps a human PR + review
          # gate between Claude's recommendations and the live
          # production code that triggers a VPS deploy. Without this,
          # an auto-applied review touching src/run_orchestrator.py
          # was deployed with zero human review.
          STAGING_BRANCH="claude/strategic-review-pending"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/run_orchestrator.py
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          # Branch off whatever ref we checked out on
          git checkout -B "$STAGING_BRANCH"
          git commit -m "chore: apply latest strategic review recommendations"
          for attempt in 1 2 3 4 5; do
            if git push -u origin "$STAGING_BRANCH" --force-with-lease; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            sleep $((attempt * 3))
          done
          exit 1
